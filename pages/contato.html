<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/x-icon" href="/images/ford-96.png">

    <link rel="stylesheet" href="/styles/reset.css">
    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/contato.css">
    <link rel="stylesheet" href="/styles/footer.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>Ford - Contato</title>
</head>

<body>
    <header class="cabecalho">
        <div class="container cabecalho-conteudo">
            <img src="/images/logo-ford-256.png" alt="Logo Ford" class="logo-cabecalho">
    
            <nav class="menu-principal">
                <ul class="lista-nav">
                    <li><a href="../index.html" >Home</a></li>
                    <li><a href="/pages/lancamento.html">Lançamento</a></li>
                    <li><a href="/pages/contato.html" class="ativo">Contato</a></li>
                </ul>
            </nav>
    
        </div>
    </header>

    <main id="conteudo-principal">
        <div class="container">
    
            <section class="secao-contato">
                <div class="layout-contato-duplo">
    
                    <div class="coluna-imagem">
                        <img src="/images/xls 2.2 diesel.jpg" alt="Ford Ranger Vermelha" class="img-destaque-contato">
                    </div>
    
                    <div class="coluna-formulario">
                        <h2 class="titulo-form">Sobre Você</h2>
    
                        <form action="#" method="post" class="formulario-contato">
                            <input type="text" id="nome" name="nome" placeholder="NOME DO USUÁRIO*" required>
    
                            <input type="email" id="email" name="email" placeholder="E-MAIL PARA CONTATO*" required>
    
                            <input type="tel" id="telefone" name="telefone" placeholder="TELEFONE*" required>
    
                            <select id="tipo-contato" name="tipo-contato" required>
                                <option value="" disabled selected>TIPO DE CONTATO*</option>
                                <option value="elogio">Elogio</option>
                                <option value="reclamacao">Reclamação</option>
                                <option value="solicitacao">Solicitação</option>
                            </select>
    
                            <textarea id="mensagem" name="mensagem" rows="4" placeholder="MENSAGEM*" required></textarea>
    
                            <button type="submit" class="botao-primario btn-enviar">Enviar</button>
                        </form>
                    </div>
    
                </div>
            </section>
    
        </div>
    </main>
    
    <footer class="rodape">
        <div class="container rodape-conteudo">
    
            <div class="rodape-social">
                <h2 class="titulo-social">Redes Sociais</h2>
                <ul class="redes-sociais">
                    <li class="item-social">
                        <a href="https://www.facebook.com/FordBrasil/?locale=pt_BR" target="_blank">
                            <img src="/images/facebook-50.png" alt="Icone do Facebook">
                        </a>
                    </li>
                    <li class="item-social">
                        <a href="https://www.youtube.com/@fordbrasil" target="_blank">
                            <img src="/images/youtube-squared-50.png" alt="Icone do Youtube">
                        </a>
                    </li>
                    <li class="item-social">
                        <a href="https://www.instagram.com/fordbrasil/" target="_blank">
                            <img src="/images/instagram-logo-50.png" alt="Icone do Instagram">
                        </a>
                    </li>
                </ul>
            </div>
    
            <img src="/images/ford-96.png" alt="Logo da Ford" class="logo-rodape">
    
        </div>
    
        <div class="container rodape-copy">
            <p class="copy">&copy;2026 Ford - Todos os direitos reservados</p>
        </div>
    </footer>
</body>

</html>
