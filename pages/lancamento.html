<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/x-icon" href="/images/ford-96.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/styles/reset.css">
    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/lancamento.css">
    <link rel="stylesheet" href="/styles/footer.css">

    <title>Ford - Lançamento</title>
</head>

<body>
    <header class="cabecalho">
        <div class="container cabecalho-conteudo">
            <img src="/images/logo-ford-256.png" alt="Logo Ford" class="logo-cabecalho">
    
            <nav class="menu-principal">
                <ul class="lista-nav">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="/pages/lancamento.html" class="ativo">Lançamento</a></li>
                    <li><a href="/pages/contato.html">Contato</a></li>
                </ul>
            </nav>
    
        </div>
    </header>

    <main id="conteudo-principal">
        <div class="container container-lancamento">
    
            <section class="video-destaque">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/vQsryuNmsL0?si=gk8GrHXw3lBayj0k&amp;controls=0"
                    title="YouTube video player" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
                </iframe>
            </section>
    
            <section class="secao-comparativo">
    
                <div class="lista-carros">
                    <article class="carro">
                        <img src="/images/XL Cabine.jpg" alt="Ford Ranger XL Cabine Simples" class="img-carro">
                        <div class="detalhes-carro">
                            <input type="checkbox" id="ranger-xl">
                            <label for="ranger-xl" class="texto-carro">
                                XL Cabine Simples 2.2 Diesel 4X4 MT 2022 <br>
                                Preço Sugerido: R$ 183.850
                            </label>
                            <img src="/images/info.png" alt="Icone de informações" class="icone-info">
                        </div>
                    </article>
    
                    <article class="carro">
                        <img src="/images/xls 2.2 diesel.jpg" alt="Ford Ranger XLS" class="img-carro">
                        <div class="detalhes-carro">
                            <input type="checkbox" id="ranger-xls">
                            <label for="ranger-xl" class="texto-carro">
                                XLS 2.2 Diesel 4X4 AT 2022 <br>
                                Preço Sugerido: R$ 220.690
                            </label>
                            <img src="/images/info.png" alt="Icone de informações" class="icone-info">
                        </div>
                    </article>
    
                    <article class="carro">
                        <img src="/images/storm.jpg" alt="Ford Ranger Storm" class="img-carro">
                        <div class="detalhes-carro">
                            <input type="checkbox" id="ranger-storm">
                            <label for="ranger-xl" class="texto-carro">
                                Storm 3.2 Diesel 4X4 AT 2022 <br>
                                Preço Sugerido: R$ 222.790
                            </label>
                            <img src="/images/info.png" alt="Icone de informações" class="icone-info">
                        </div>
                    </article>
    
                </div>
    
                <div class="acao-comparar">
                    <button class="botao-primario">Comparar Carros</button>
                </div>
    
            </section>
    
        </div>
    </main>

<footer class="rodape">
    <div class="container rodape-conteudo">

        <div class="rodape-social">
            <h2 class="titulo-social">Redes Sociais</h2>
            <ul class="redes-sociais">
                <li class="item-social">
                    <a href="https://www.facebook.com/FordBrasil/?locale=pt_BR" target="_blank">
                        <img src="/images/facebook-50.png" alt="Icone do Facebook">
                    </a>
                </li>
                <li class="item-social">
                    <a href="https://www.youtube.com/@fordbrasil" target="_blank">
                        <img src="/images/youtube-squared-50.png" alt="Icone do Youtube">
                    </a>
                </li>
                <li class="item-social">
                    <a href="https://www.instagram.com/fordbrasil/" target="_blank">
                        <img src="/images/instagram-logo-50.png" alt="Icone do Instagram">
                    </a>
                </li>
            </ul>
        </div>

        <img src="/images/ford-96.png" alt="Logo da Ford" class="logo-rodape">

    </div>

    <div class="container rodape-copy">
        <p class="copy">&copy;2026 Ford - Todos os direitos reservados</p>
    </div>
</footer>
</body>

</html>
